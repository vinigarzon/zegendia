[build]
  command = "pnpm build"
  publish = "out"

[build.environment]
  NODE_VERSION = "22"

[functions]
  node_bundler = "esbuild"

[[edge_functions]]
  path = "/*"
  function = "locale-router"

[[redirects]]
  from = "/api/chatbot"
  to = "/.netlify/functions/chatbot"
  status = 200
  force = true

[[redirects]]
  from = "/api/contact"
  to = "/.netlify/functions/contact"
  status = 200
  force = true

[[redirects]]
  from = "/es"
  to = "/"
  status = 301

[[redirects]]
  from = "/es/*"
  to = "/:splat"
  status = 301
